<!-- Supabase Auth → Email Templates → "Magic Link"
     Assunto: Confirme seu acesso à Atenvo
     Usado para usuário PREEXISTENTE (já tem senha): autentica e aceita o convite sem redefinir senha.
     Variáveis: {{ .ConfirmationURL }}. Nunca exibir token/senha. -->
<div style="font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;max-width:520px;margin:0 auto;color:#0f172a">
  <h2 style="font-size:20px;font-weight:600;margin:0 0 8px">Confirme seu acesso à Atenvo</h2>
  <p style="font-size:14px;line-height:1.6;color:#475569;margin:0 0 20px">
    Você foi convidado para uma organização na Atenvo. Como você já tem uma conta, basta confirmar para aceitar o convite — sua senha atual continua valendo.
  </p>
  <p style="margin:0 0 24px">
    <a href="{{ .ConfirmationURL }}" style="display:inline-block;background:#19C37D;color:#fff;text-decoration:none;font-weight:600;font-size:14px;padding:11px 20px;border-radius:9px">Acessar e aceitar convite</a>
  </p>
  <p style="font-size:12px;line-height:1.6;color:#8a97a8;margin:0">
    Se você não reconhece este convite, ignore esta mensagem.
  </p>
</div>
