<!doctype html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Atenvo — Demonstração</title>
<style>
  :root{
    --accent:#19C37D; --accent-ink:#0e9d63; --accent-soft:#e8f7ef; --accent-soft-2:#d8f0e4;
    --wa:#1FA855; --wa-soft:#e7f6ee; --fb:#2563EB; --fb-soft:#e8f0fe; --purple:#7a5bb0;
    --ok:#0e9d63; --ok-soft:#e7f6ef; --warn:#c2772a; --warn-soft:#fbeede; --err:#d6453f; --err-soft:#fbe8e7;
    --info:#2563EB; --info-soft:#e9f0fe; --bar:#cfe9dc; --grid:#eceff4;
    --bg:#f4f6f9; --surface:#ffffff; --surface-2:#f7f9fb; --hover:#f1f4f8;
    --ink:#0f172a; --ink-2:#475569; --muted:#8a97a8; --line:#e8ecf2; --line-2:#dfe5ec; --logo-ink:#0f1f33;
    --ring:rgba(25,195,125,.4); --shadow:0 1px 2px rgba(16,24,40,.05),0 1px 3px rgba(16,24,40,.05); --shadow-pop:0 12px 32px rgba(16,24,40,.16);
  }
  [data-theme="dark"]{
    --accent-soft:rgba(25,195,125,.15); --accent-soft-2:rgba(25,195,125,.24); --wa-soft:rgba(31,168,85,.16); --fb-soft:rgba(37,99,235,.18);
    --ok-soft:rgba(25,195,125,.16); --warn-soft:rgba(194,119,42,.20); --err-soft:rgba(214,69,63,.18); --info-soft:rgba(37,99,235,.16); --bar:#1f3a52; --grid:#1a2740;
    --bg:#0a1220; --surface:#0f1a2c; --surface-2:#13203a; --hover:#172539; --ink:#eef2f8; --ink-2:#b3c0d2; --muted:#8294ac; --line:#21314a; --line-2:#2a3b57; --logo-ink:#f3f6fb;
    --shadow:0 1px 2px rgba(0,0,0,.4); --shadow-pop:0 14px 36px rgba(0,0,0,.5);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--ink);font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;font-size:14px;-webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer}
  ::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-thumb{background:rgba(120,130,145,.3);border-radius:8px}
  .demo-bar{position:fixed;top:0;left:0;right:0;height:28px;z-index:60;display:flex;align-items:center;justify-content:center;gap:8px;background:#7a5bb0;color:#fff;font-size:12.5px;font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,.2)}
  .demo-bar .d{width:7px;height:7px;border-radius:50%;background:#fff;opacity:.9}
  .app{display:flex;height:100dvh;margin-top:28px;height:calc(100dvh - 28px)}
  /* sidebar */
  .sidebar{width:236px;flex:none;background:var(--surface);border-right:1px solid var(--line);padding:18px 14px 14px;display:flex;flex-direction:column}
  .brand{display:flex;align-items:center;gap:9px;padding:2px 6px 0}
  .mark{width:30px;height:30px;border-radius:9px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#04130c;font-weight:800;font-size:16px}
  .logo-text{font-size:22px;font-weight:600;color:var(--logo-ink);letter-spacing:-.02em}
  .brand-sub{font-size:11px;color:var(--muted);padding:4px 6px 0}
  .nav{margin-top:18px;display:flex;flex-direction:column;gap:2px;flex:1;overflow-y:auto}
  .nav-item{display:flex;align-items:center;gap:12px;padding:9px 11px;border-radius:10px;color:var(--ink-2);font-size:14px;font-weight:500;border:0;background:transparent;width:100%;text-align:left;transition:background .12s,color .12s}
  .nav-item svg{width:20px;height:20px;color:var(--muted)}
  .nav-item:hover{background:var(--hover)}
  .nav-item.on{background:var(--accent-soft);color:var(--accent-ink)}
  .nav-item.on svg{color:var(--accent)}
  .side-foot{margin-top:8px;border-top:1px solid var(--line);padding-top:12px;display:flex;flex-direction:column;gap:10px}
  .theme-row{display:flex;align-items:center;gap:9px;padding:0 4px;font-size:13px;color:var(--ink-2)}
  .tsw{margin-left:auto;width:42px;height:24px;border-radius:999px;border:0;background:var(--accent);position:relative}
  [data-theme="light"] .tsw{background:#cdd6e1}
  .tsw .k{position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left .16s;box-shadow:0 1px 2px rgba(0,0,0,.25)}
  [data-theme="dark"] .tsw .k{left:21px}
  .user{display:flex;align-items:center;gap:10px;padding:8px;border-radius:11px}
  .av{display:inline-flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:12px;border-radius:50%;flex:none;width:34px;height:34px}
  .user .nm{font-size:13.5px;font-weight:600;color:var(--ink)} .user .rl{font-size:12px;color:var(--muted)}
  /* main */
  .col-main{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden}
  .topbar{display:flex;align-items:center;gap:14px;padding:16px 24px;border-bottom:1px solid var(--line);background:var(--surface)}
  .page-title{font-size:19px;font-weight:600}.page-sub{font-size:13px;color:var(--muted);margin-top:2px}
  .content{flex:1;min-height:0;overflow-y:auto;padding:20px 24px 28px}
  .screen{display:none}.screen.on{display:block;animation:fade .2s}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1}}
  /* generic */
  .card{background:var(--surface);border:1px solid var(--line);border-radius:14px}
  .card-h{padding:16px 18px;border-bottom:1px solid var(--line)}.card-h h3{margin:0;font-size:15px;font-weight:600}.card-h p{margin:3px 0 0;font-size:12.5px;color:var(--muted)}
  .btn{height:38px;padding:0 14px;border-radius:9px;border:1px solid var(--line-2);background:var(--surface);color:var(--ink-2);font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:7px}
  .btn:hover{background:var(--hover)}
  .btn.acc{background:var(--accent);border-color:var(--accent);color:#04130c}
  .btn.sm{height:32px;padding:0 11px;font-size:12.5px}
  .btn.danger{color:var(--err);border-color:var(--err)} .btn.danger:hover{background:var(--err-soft)}
  .badge{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:999px;white-space:nowrap}
  .badge .dot{width:6px;height:6px;border-radius:50%;background:currentColor}
  .badge.ok{background:var(--ok-soft);color:var(--ok)} .badge.warn{background:var(--warn-soft);color:var(--warn)} .badge.err{background:var(--err-soft);color:var(--err)}
  .badge.blue{background:var(--info-soft);color:var(--info)} .badge.neutral{background:var(--surface-2);color:var(--muted);border:1px solid var(--line-2)}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:14px;margin-bottom:16px}
  .kpi{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:15px 16px}
  .kpi .l{font-size:12.5px;color:var(--muted)}.kpi .v{font-size:22px;font-weight:600;margin:4px 0 3px;letter-spacing:-.01em}
  .kpi .delta{font-size:12px;font-weight:600}.delta.up{color:var(--ok)}.delta.down{color:var(--err)}.delta.flat{color:var(--muted)}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;font-size:11px;font-weight:600;color:var(--muted);padding:12px 14px;border-bottom:1px solid var(--line);white-space:nowrap}
  td{padding:12px 14px;border-bottom:1px solid var(--line);color:var(--ink-2)}
  tr:last-child td{border-bottom:0}
  tbody tr:hover{background:var(--surface-2)}
  .cellnm{font-weight:600;color:var(--ink)}
  .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
  .search{display:flex;align-items:center;gap:8px;height:38px;padding:0 12px;border:1px solid var(--line-2);border-radius:9px;background:var(--surface);min-width:240px}
  .search input{border:0;background:transparent;outline:none;color:var(--ink);font-size:13px;width:100%}
  select.flt{height:38px;border:1px solid var(--line-2);border-radius:9px;background:var(--surface);color:var(--ink-2);font-size:13px;padding:0 12px}
  .sp{margin-left:auto}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}@media(max-width:1100px){.grid2{grid-template-columns:1fr}}
  /* whatsapp */
  .wa{display:grid;grid-template-columns:330px 1fr;gap:0;height:calc(100dvh - 28px - 120px);min-height:460px;border:1px solid var(--line);border-radius:14px;overflow:hidden;background:var(--surface)}
  .wa-list{border-right:1px solid var(--line);display:flex;flex-direction:column;min-width:0}
  .wa-list .hd{padding:12px;border-bottom:1px solid var(--line);display:flex;flex-direction:column;gap:8px}
  .wa-items{overflow-y:auto;flex:1}
  .ci{display:flex;gap:11px;padding:11px 13px;border-bottom:1px solid var(--line);cursor:pointer}
  .ci:hover,.ci.on{background:var(--surface-2)}
  .ci .mid{flex:1;min-width:0}.ci .top{display:flex;justify-content:space-between;gap:8px}
  .ci .nm{font-weight:600;color:var(--ink);font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ci .hr{font-size:11px;color:var(--muted);flex:none}
  .ci .pv{font-size:12.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
  .ci .meta{display:flex;gap:6px;align-items:center;margin-top:5px}
  .unread{background:var(--accent);color:#04130c;font-size:10.5px;font-weight:700;border-radius:999px;min-width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;padding:0 5px}
  .wa-thread{display:flex;flex-direction:column;min-width:0}
  .th-hd{padding:13px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:11px}
  .th-body{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:9px;background:var(--surface-2)}
  .msg{max-width:74%;padding:9px 12px;border-radius:12px;font-size:13px;line-height:1.45;box-shadow:var(--shadow)}
  .msg .t{font-size:10px;color:var(--muted);margin-top:4px;text-align:right}
  .msg.in{align-self:flex-start;background:var(--surface);border:1px solid var(--line)}
  .msg.out{align-self:flex-end;background:var(--accent-soft);border:1px solid var(--accent-soft-2)}
  .th-foot{padding:12px 14px;border-top:1px solid var(--line);display:flex;gap:9px}
  .th-foot input{flex:1;height:40px;border:1px solid var(--line-2);border-radius:10px;background:var(--surface-2);padding:0 13px;color:var(--ink);outline:none}
  .empty{padding:40px 16px;text-align:center;color:var(--muted)}
  /* kanban */
  .board{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px}
  .col{flex:0 0 230px;background:var(--surface-2);border:1px solid var(--line);border-radius:12px;display:flex;flex-direction:column;max-height:calc(100dvh - 28px - 150px)}
  .col-h{padding:11px 13px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--line)}
  .col-h .ct{margin-left:auto;font-size:11px;color:var(--muted);background:var(--surface);border:1px solid var(--line-2);border-radius:999px;padding:1px 8px}
  .col-b{padding:10px;display:flex;flex-direction:column;gap:9px;overflow-y:auto;flex:1;min-height:60px}
  .kc{background:var(--surface);border:1px solid var(--line-2);border-radius:10px;padding:11px;cursor:grab;box-shadow:var(--shadow)}
  .kc:active{cursor:grabbing}
  .kc.drag{opacity:.4}
  .kc .nm{font-weight:600;font-size:13px;color:var(--ink)}
  .kc .vl{font-size:13px;color:var(--accent-ink);font-weight:600;margin-top:3px}
  .kc .mt{display:flex;gap:6px;align-items:center;margin-top:8px;flex-wrap:wrap}
  .pill{font-size:11px;color:var(--ink-2);background:var(--surface-2);border:1px solid var(--line-2);border-radius:999px;padding:2px 8px}
  .col.dragover{outline:2px dashed var(--accent);outline-offset:-3px}
  /* bars / funnel */
  .barlist{display:flex;flex-direction:column;gap:10px;padding:14px 0}
  .brow{display:grid;grid-template-columns:150px 1fr 64px;align-items:center;gap:10px}
  .brow .bn{font-size:12.5px;color:var(--ink-2)}
  .btrack{height:11px;border-radius:6px;background:var(--surface-2);overflow:hidden}.btrack i{display:block;height:100%;background:var(--accent);border-radius:6px}
  .brow .bv{font-size:12.5px;font-weight:600;text-align:right}
  .funnel{display:flex;flex-direction:column;gap:8px;padding:8px 0}
  .frow{display:flex;align-items:center;gap:11px}.frow .fn{width:150px;font-size:12.5px;color:var(--ink-2)}
  .fbar{flex:1;height:24px;background:var(--surface-2);border-radius:7px;overflow:hidden}.fbar i{display:block;height:100%;background:var(--accent)}
  .frow .fv{width:42px;text-align:right;font-weight:600}
  /* tabs (config) */
  .tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:16px;flex-wrap:wrap}
  .tabs button{height:36px;padding:0 14px;border:0;background:transparent;color:var(--ink-2);font-size:13.5px;font-weight:500;border-bottom:2px solid transparent;margin-bottom:-1px}
  .tabs button.on{color:var(--accent-ink);border-bottom-color:var(--accent);font-weight:600}
  .tabpane{display:none}.tabpane.on{display:block}
  .toggle-row{display:flex;align-items:center;gap:14px;padding:13px 0;border-bottom:1px solid var(--line)}
  .toggle-row .tx{flex:1}.toggle-row .t{font-weight:600;font-size:13.5px}.toggle-row .d{font-size:12.5px;color:var(--muted)}
  .bigsw{width:44px;height:25px;border-radius:999px;border:0;background:var(--line-2);position:relative}.bigsw.on{background:var(--accent)}
  .bigsw .k{position:absolute;top:3px;left:3px;width:19px;height:19px;border-radius:50%;background:#fff;transition:left .16s}.bigsw.on .k{left:22px}
  /* modal + toast */
  .backdrop{position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;align-items:center;justify-content:center;z-index:80;padding:20px}
  .backdrop.show{display:flex}
  .modal{background:var(--surface);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow-pop);width:100%;max-width:460px;overflow:hidden}
  .modal .mh{padding:18px 20px;border-bottom:1px solid var(--line);font-size:16px;font-weight:600}
  .modal .mb{padding:18px 20px;font-size:13.5px;color:var(--ink-2);line-height:1.55}
  .modal .mf{padding:14px 20px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px}
  .field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}.field label{font-size:12.5px;font-weight:600;color:var(--ink-2)}
  .field .ctrl{height:40px;border:1px solid var(--line-2);border-radius:9px;background:var(--surface-2);padding:0 12px;color:var(--ink);outline:none}
  .toasts{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:90;display:flex;flex-direction:column;gap:8px;align-items:center}
  .toast{background:#1f2937;color:#fff;font-size:13px;font-weight:500;padding:10px 16px;border-radius:10px;box-shadow:var(--shadow-pop);max-width:420px}
  [data-theme="dark"] .toast{background:#22324a;border:1px solid var(--line-2)}
  .sechead{font-size:14px;font-weight:600;margin:18px 0 12px}
  @media(max-width:860px){
    .sidebar{width:64px;padding:14px 8px}.logo-text,.brand-sub,.nav-item span,.theme-row span,.user .meta{display:none}
    .nav-item{justify-content:center;padding:11px 0}.brand{justify-content:center}.user{justify-content:center}
    .wa{grid-template-columns:1fr}.wa-thread{display:none}.wa.show-thread .wa-list{display:none}.wa.show-thread .wa-thread{display:flex}
    .grid2{grid-template-columns:1fr}
  }
</style>
</head>
<body>
  <div class="demo-bar"><span class="d"></span> DEMO — Ambiente com dados fictícios</div>
  <div class="app">
    <aside class="sidebar">
      <div class="brand"><span class="mark">A</span><span class="logo-text">Atenvo</span></div>
      <div class="brand-sub">Plataforma de Atendimento e Gestão</div>
      <nav class="nav" id="nav"></nav>
      <div class="side-foot">
        <div class="theme-row"><span>Tema</span><button class="tsw" id="tsw" onclick="toggleTheme()"><span class="k"></span></button></div>
        <div class="user"><span class="av" style="background:#3f6f52">M</span><div class="meta"><div class="nm">Matheus</div><div class="rl">Administrador</div></div></div>
      </div>
    </aside>
    <main class="col-main">
      <div class="topbar"><div><div class="page-title" id="ptitle">WhatsApp</div><div class="page-sub" id="psub">Central de atendimento</div></div>
        <div class="sp"></div><button class="btn" onclick="simulado()">Exportar</button><button class="btn acc" onclick="simulado()">Nova ação</button></div>
      <div class="content" id="content"></div>
    </main>
  </div>

  <div class="backdrop" id="backdrop" onclick="if(event.target===this)closeModal()"><div class="modal" id="modal"></div></div>
  <div class="toasts" id="toasts"></div>

<script>

function cpf(i){return '***.'+((i*137)%900+100)+'.'+((i*53)%900+100)+'-**';}

const CONVERSAS = [
  {nome:'João Silva',chip:0,resp:'Matheus',st:'Em atendimento',hr:'09:42',pv:'Perfeito, vou enviar os documentos.',un:0,msgs:[['in','Olá, vi o anúncio sobre revisão de contrato.','09:31'],['out','Oi João! Posso te ajudar com a renegociação. Você tem o número do contrato?','09:34'],['in','Tenho sim, é o 4471-AC.','09:38'],['out','Ótimo. Vou analisar e já te retorno com a simulação de economia.','09:40'],['in','Perfeito, vou enviar os documentos.','09:42']]},

  {nome:'Patrícia Souza',chip:3,resp:'Marina',st:'Aberta',hr:'10:25',pv:'Vim pelo Facebook 🙂',un:1,msgs:[['in','Vim pelo Facebook 🙂','10:25']]},
  {nome:'Rafael Costa',chip:2,resp:'Carlos',st:'Sem resposta',hr:'07:48',pv:'Alguém pode me ligar?',un:1,msgs:[['in','Alguém pode me ligar?','07:48']]},
  {nome:'Fernanda Alves',chip:0,resp:'Carlos',st:'Resolvida',hr:'Ontem',pv:'Assinei a procuração.',un:0,msgs:[['out','Fernanda, enviei o link da procuração digital.','Ontem'],['in','Assinei a procuração.','Ontem']]},
];
const FBCONV = [

function buildNav(){
  document.getElementById('nav').innerHTML=NAV.map(([id,label,fill,filled],i)=>{
    const path=filled?`<path d="${fill}"/>`:(ICON[id]||'');
    const svg=`<svg viewBox="0 0 24 24" ${filled?'fill="currentColor"':'fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"'}>${path}</svg>`;
    return `<button class="nav-item${i===0?' on':''}" data-id="${id}" onclick="go('${id}')">${svg}<span>${label}</span></button>`;
  }).join('');
}
function go(id){
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.toggle('on',b.dataset.id===id));
  document.getElementById('ptitle').textContent=NAV.find(n=>n[0]===id)[1];
  document.getElementById('psub').textContent=SUB[id]||'';
  render(id);
}
function render(id){document.getElementById('content').innerHTML=(SCREENS[id]||(()=>'<div class="empty">Em breve.</div>'))();afterRender[id]&&afterRender[id]();}

function renderWaList(){
  const q=(document.getElementById('waSearch')?.value||'').toLowerCase();
  const items=CONVERSAS.map((c,i)=>({...c,i})).filter(c=>(!q||c.nome.toLowerCase().includes(q))&&(!waFilterSt||c.st===waFilterSt)&&(waFilterChip===''||c.chip==+waFilterChip));
  const el=document.getElementById('waItems');
  el.innerHTML=items.length?items.map(c=>`<div class="ci${c.i===waSel?' on':''}" onclick="openConversa(${c.i})">
    <span class="av" style="background:${avc(c.nome)}">${ini(c.nome)}</span>
    <div class="mid"><div class="top"><span class="nm">${c.nome}</span><span class="hr">${c.hr}</span></div>
    <div class="pv">${c.pv}</div>
    <div class="meta"><span class="badge ${stCls(c.st)}" style="font-size:10px;padding:2px 7px">${c.st}</span><span class="pill" style="font-size:10px">${CHIPS[c.chip].nome.split(' — ')[0]}</span>${c.un?`<span class="unread" style="margin-left:auto">${c.un}</span>`:''}</div></div>
  </div>`).join(''):'<div class="empty">Nenhuma conversa.</div>';
}
function openConversa(i){waSel=i;const c=CONVERSAS[i];document.getElementById('wa')?.classList.add('show-thread');
  document.querySelectorAll('.ci').forEach(x=>x.classList.remove('on'));
  const t=document.getElementById('waThread');if(!t)return;
  t.innerHTML=`<div class="th-hd"><span class="av" style="background:${avc(c.nome)}">${ini(c.nome)}</span>
    <div style="flex:1"><div style="font-weight:600">${c.nome}</div><div style="font-size:12px;color:var(--muted)">${CHIPS[c.chip].nome} · Responsável: ${c.resp}</div></div>
    <span class="badge ${stCls(c.st)}">${c.st}</span></div>
   <div class="th-body" id="thBody">${c.msgs.map(m=>`<div class="msg ${m[0]}">${m[1]}<div class="t">${m[2]}</div></div>`).join('')}</div>
   <div class="th-foot"><input id="msgIn" placeholder="Digite uma mensagem..." onkeydown="if(event.key==='Enter')sendMsg()"><button class="btn acc" onclick="sendMsg()">Enviar</button><button class="btn" onclick="simulado()" title="Anexo">📎</button></div>`;
  renderWaList();
}
function sendMsg(){const inp=document.getElementById('msgIn');const v=(inp.value||'').trim();if(!v)return;
  const c=CONVERSAS[waSel];const hr=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  c.msgs.push(['out',v,hr]);c.pv=v;c.un=0;inp.value='';
  const b=document.getElementById('thBody');b.insertAdjacentHTML('beforeend',`<div class="msg out">${v}<div class="t">${hr} ✓</div></div>`);b.scrollTop=b.scrollHeight;renderWaList();toast('Mensagem fictícia enviada.');}

function renderBoard(){

    return `<div class="col" data-col="${ci}" ondragover="event.preventDefault();this.classList.add('dragover')" ondragleave="this.classList.remove('dragover')" ondrop="dropCard(event,${ci})">

        <div class="mt"><span class="pill">${c.or}</span><span class="pill">${c.resp}</span></div></div>`).join('')}</div></div>`;
  }).join('');
}
let dragId=null;
function dragStart(e,id){dragId=id;e.currentTarget.classList.add('drag');e.dataTransfer.effectAllowed='move';}
function dropCard(e,col){e.preventDefault();document.querySelectorAll('.col').forEach(c=>c.classList.remove('dragover'));
  const c=CARDS.find(x=>x.id===dragId);if(c&&c.col!==col){c.col=col;renderBoard();toast('Card movido para "'+KCOLS[col]+'" (apenas nesta sessão).');}dragId=null;}
function openCardInfo(id){const c=CARDS.find(x=>x.id===id);modal(`<div class="mh">${c.nome}</div><div class="mb"><b>Valor:</b> ${fmtBRL(c.vl)}<br><b>Origem:</b> ${c.or}<br><b>Responsável:</b> ${c.resp}<br><b>Etapa:</b> ${KCOLS[c.col]}</div><div class="mf"><button class="btn" onclick="closeModal()">Fechar</button><button class="btn acc" onclick="simulado()">Avançar etapa</button></div>`);}

function registrarPgto(i){const c=CONTRATOS[i];modal(`<div class="mh">Registrar pagamento</div><div class="mb">Baixa da parcela ${c.pg+1} de <b>${c.cli}</b> — ${fmtBRL(c.vm)}.<br>Pagamento integral (sem parcial nesta demo).</div><div class="mf"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn acc" onclick="confirmPgto(${i})">Confirmar pagamento</button></div>`);}

  <div style="padding:13px 16px"><button class="btn acc" onclick="simulado()">+ Conectar WhatsApp</button></div></div>
  <div class="card"><div class="card-h"><h3>Facebook</h3><p>Páginas do Messenger.</p></div>
  <div class="ci" style="cursor:default"><span class="av" style="background:var(--fb)"><svg width="18" height="18" viewBox="0 0 24 24" fill="#fff"><path d="M22 12a10 10 0 1 0-11.6 9.9v-7H8v-2.9h2.4V9.8c0-2.4 1.4-3.7 3.6-3.7 1 0 2.1.2 2.1.2v2.3h-1.2c-1.2 0-1.5.7-1.5 1.4V12H16l-.4 2.9h-2.2v7A10 10 0 0 0 22 12z"/></svg></span>
   <div class="mid"><div class="nm">Central Financeira Demo</div><div class="pv">Página Messenger · Gestor: Marina</div></div>
   <div style="display:flex;gap:8px;align-items:center"><span class="badge ok"><span class="dot"></span>Conectado</span><button class="btn sm" onclick="simulado()">Reconectar</button></div></div>
  <div style="padding:13px 16px"><button class="btn acc" onclick="simulado()">+ Conectar com Facebook</button></div></div>`;

SCREENS.relatorios=()=>{
  const maxLead=Math.max(...REL_CHIP.map(c=>c.leads)),maxRec=Math.max(...REL_EQUIPE.map(e=>e.rec)),maxResp=Math.max(...REL_EQUIPE.map(e=>e.resp));
  const recTot=REL_CHIP.reduce((s,c)=>s+c.rec,0);
  return `<div class="kpis">
    <div class="kpi"><div class="l">Receita recebida</div><div class="v">${fmtBRL(recTot)}</div><div class="delta up">▲ +14% vs mês anterior</div></div>
    <div class="kpi"><div class="l">Clientes fechados</div><div class="v">${REL_CHIP.reduce((s,c)=>s+c.fech,0)}</div><div class="delta up">▲ +6 vs mês anterior</div></div>
    <div class="kpi"><div class="l">Inadimplência</div><div class="v">7,4%</div><div class="delta up">▼ -1,2% vs mês anterior</div></div>
    <div class="kpi"><div class="l">Economia gerada</div><div class="v">${fmtBRL(312800)}</div><div class="delta up">▲ +9% vs mês anterior</div></div></div>
   <div class="grid2">
    <div class="card"><div class="card-h"><h3>Leads por conexão</h3><p>Chip 1 recebe mais leads; URA tem maior volume bruto.</p></div><div style="padding:6px 18px 16px"><div class="barlist">${REL_CHIP.map(c=>`<div class="brow"><span class="bn">${c.chip.split(' — ')[0]}</span><div class="btrack"><i style="width:${c.leads/maxLead*100}%"></i></div><span class="bv">${c.leads}</span></div>`).join('')}</div></div></div>
    <div class="card"><div class="card-h"><h3>Conversão por conexão</h3><p>Chip 2 converte mais; URA converte menos (menor qualificação).</p></div><div style="padding:6px 18px 16px"><div class="barlist">${REL_CHIP.map(c=>`<div class="brow"><span class="bn">${c.chip.split(' — ')[0]}</span><div class="btrack"><i style="width:${c.conv/22*100}%"></i></div><span class="bv">${c.conv.toFixed(1)}%</span></div>`).join('')}</div></div></div>
   </div>
   <div class="card" style="margin-top:16px"><div class="card-h"><h3>Desempenho por conexão de WhatsApp</h3></div>
    <table><thead><tr><th>Conexão</th><th>Leads</th><th>Qualificação</th><th>Fechados</th><th>Conversão</th><th>Receita</th></tr></thead><tbody>
    ${REL_CHIP.map(c=>`<tr><td class="cellnm">${c.chip}</td><td>${c.leads}</td><td>${c.qual}%</td><td>${c.fech}</td><td><span class="badge ok">${c.conv.toFixed(1)}%</span></td><td>${fmtBRL(c.rec)}</td></tr>`).join('')}</tbody></table></div>
   <div class="grid2" style="margin-top:16px">
    <div class="card"><div class="card-h"><h3>Conversas respondidas por atendente</h3><p>Carlos responde mais conversas.</p></div><div style="padding:6px 18px 16px"><div class="barlist">${REL_EQUIPE.map(e=>`<div class="brow"><span class="bn">${e.n}</span><div class="btrack"><i style="width:${e.resp/maxResp*100}%"></i></div><span class="bv">${e.resp}</span></div>`).join('')}</div></div></div>
    <div class="card"><div class="card-h"><h3>Receita por atendente</h3><p>Matheus gera mais receita; Marina fecha mais clientes.</p></div><div style="padding:6px 18px 16px"><div class="barlist">${REL_EQUIPE.map(e=>`<div class="brow"><span class="bn">${e.n} · ${e.fech} fech.</span><div class="btrack"><i style="width:${e.rec/maxRec*100}%"></i></div><span class="bv">${(e.rec/1000).toFixed(0)}k</span></div>`).join('')}</div></div></div>
   </div>`;
};

let cfgTab='conta';
SCREENS.configuracoes=()=>{
  return `<div class="tabs">${['conta','Conta','equipe','Equipe','canais','Canais','notif','Notificações','prefs','Preferências'].reduce((a,_,i,arr)=>{if(i%2)return a;a.push(`<button class="${cfgTab===arr[i]?'on':''}" onclick="cfgTab='${arr[i]}';render('configuracoes')">${arr[i+1]}</button>`);return a;},[]).join('')}</div>
  <div class="tabpane ${cfgTab==='conta'?'on':''}"><div class="card"><div class="card-h"><h3>Perfil</h3></div><div style="padding:16px 18px;display:flex;align-items:center;gap:14px"><span class="av" style="width:54px;height:54px;font-size:18px;background:#3f6f52">M</span><div><div style="font-weight:600;font-size:16px">Matheus</div><div style="color:var(--muted);font-size:13px">Administrador · matheus@demo.atenvo</div></div><div class="sp"></div><button class="btn" onclick="simulado()">Alterar foto</button></div></div>
   <div class="card" style="margin-top:16px"><div class="card-h"><h3>Empresa</h3></div><div style="padding:16px 18px;display:grid;grid-template-columns:1fr 1fr;gap:14px">
   <div class="field"><label>Nome</label><input class="ctrl" value="Central Financeira Demo"></div><div class="field"><label>CNPJ</label><input class="ctrl" value="00.000.000/0001-00"></div>
   <div class="field"><label>Fuso horário</label><input class="ctrl" value="America/Sao_Paulo"></div><div class="field"><label>Moeda</label><input class="ctrl" value="Real (R$)"></div></div>
   <div style="padding:0 18px 16px"><button class="btn acc" onclick="toast('Dados salvos (simulado).')">Salvar alterações</button></div></div></div>
  <div class="tabpane ${cfgTab==='equipe'?'on':''}"><div class="card"><div class="card-h"><h3>Membros da equipe</h3></div><table><thead><tr><th>Membro</th><th>Função</th><th>Status</th></tr></thead><tbody>
   ${EQUIPE.map(e=>`<tr><td><div style="display:flex;align-items:center;gap:10px"><span class="av" style="width:30px;height:30px;background:${e.c}">${ini(e.n)}</span><span class="cellnm">${e.n}</span></div></td><td><span class="badge ${e.r==='Administrador'?'ok':e.r==='Supervisora'?'blue':'neutral'}">${e.r}</span></td><td><span class="badge ok"><span class="dot"></span>Ativo</span></td></tr>`).join('')}</tbody></table>
   <div style="padding:13px 16px"><button class="btn acc" onclick="simulado()">Convidar membro</button></div></div></div>
  <div class="tabpane ${cfgTab==='canais'?'on':''}"><div class="card"><div class="card-h"><h3>Canais conectados</h3></div>${CHIPS.map(c=>`<div class="ci" style="cursor:default"><div class="mid"><div class="nm">${c.nome}</div><div class="pv">${c.num} · ${c.tipo}</div></div><span class="badge ok"><span class="dot"></span>Conectado</span></div>`).join('')}<div style="padding:13px 16px"><button class="btn" onclick="go('integracoes')">Abrir Integrações</button></div></div></div>
  <div class="tabpane ${cfgTab==='notif'?'on':''}"><div class="card"><div class="card-h"><h3>Notificações</h3></div><div style="padding:6px 18px">
   ${['Novos contatos e leads','Mensagens não respondidas','Cobranças vencendo','Resumo diário','Notificações push'].map((t,i)=>`<div class="toggle-row"><div class="tx"><div class="t">${t}</div></div><button class="bigsw ${i%2?'':'on'}" onclick="this.classList.toggle('on')"><span class="k"></span></button></div>`).join('')}</div></div></div>
  <div class="tabpane ${cfgTab==='prefs'?'on':''}"><div class="card"><div class="card-h"><h3>Preferências</h3></div><div style="padding:8px 18px">
   <div class="toggle-row"><div class="tx"><div class="t">Tema</div><div class="d">Claro ou escuro.</div></div><button class="btn" onclick="toggleTheme()">Alternar tema</button></div>
   ${['Mostrar dicas e tutoriais','Reproduzir sons'].map(t=>`<div class="toggle-row"><div class="tx"><div class="t">${t}</div></div><button class="bigsw on" onclick="this.classList.toggle('on')"><span class="k"></span></button></div>`).join('')}</div></div></div>`;
};

SCREENS.plano=()=>`<div class="grid2"><div class="card"><div class="card-h"><h3>Plano Atenvo</h3><p>Assinatura ativa.</p></div><div style="padding:18px"><div style="display:flex;align-items:baseline;gap:8px"><span style="font-size:26px;font-weight:700">R$ 297</span><span style="color:var(--muted)">/mês</span><span class="badge ok" style="margin-left:auto"><span class="dot"></span>Ativa</span></div>

buildNav();go('whatsapp');
